version: "3.9"

services:
    app:
        container_name: america-facturacion
        build: ./docker
        image: america/facturacion

        ports:
            - "8000:80"
        volumes:
            - ./:/var/www/html
        depends_on:
            - db
        links:
            - db
    db:
        container_name: america-postgres
        image: postgres
        ports:
            - "5433:5432"
        volumes:
            - ./postgres-data:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: P4ssw0rd
            POSTGRES_DB: db_facturacion
